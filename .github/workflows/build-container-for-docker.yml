name: Build Docker Image
# v1.0.4

on:
  push:
    tags:
      - "v*.*.*" # e.g. PASS on v1.2.3
  workflow_dispatch:

jobs:
  validate_tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      is_valid: ${{ steps.check.outputs.is_valid }}
    steps:
      - id: check
        name: Validate full semver tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "is_valid=true" >> "${GITHUB_OUTPUT}"
              elif [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-((alpha|beta|pre|rc)([.-][0-9A-Za-z]+)*))?$ ]]; then
            echo "is_valid=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_valid=false" >> "${GITHUB_OUTPUT}"
            echo "Tag ${GITHUB_REF_NAME} is not a full semver tag like v1.3.0"
          fi

  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Set release date
        run: |
          echo "RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> ${GITHUB_ENV}

      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_API_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          flavor: |
            latest=false
          images: ${{ vars.DOCKER_ORGANIZATION }}/${{ vars.DOCKER_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch,enable={{is_not_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}

      # Needed for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./build/package/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            "APPLICATION=${{ vars.DOCKER_APPLICATION || github.event.repository.name }}"
            "BUILD_RFC3339=${{ env.RELEASE_DATE }}"
            DESCRIPTION="${{ github.event.repository.description }}"
            "PACKAGE=${{ github.repository }}"
            "REVISION=${{ github.sha }}"
            "VERSION=${{ github.ref_name }}"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}


# SSL/TLS support: yes, no, required. <doc/wiki/SSL.txt>
ssl = required

# DHE Groups from https://wiki.mozilla.org/Security/Server_Side_TLS#Pre-defined_DHE_groups
ssl_dh = </etc/ssl/ffdhe4096.pem

# Minimum SSL protocol version
ssl_min_protocol = TLSv1.2

# Permitted SSL ciphers
ssl_cipher_list = ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384

# Prefer the server's order of ciphers over client's.
ssl_prefer_server_ciphers = yes

# SSL extra options. Currently supported options are:
#   no_compression - Disable compression.
#   no_ticket - Disable SSL session tickets.
ssl_options = no_compression no_ticket

# How mail is found
mail_location = mbox:~/mail:INBOX=/var/mail/%u
mail_privileged_group = mail

# Turn on protocols
protocols = imap pop3 lmtp

# turn off pop3 (non-ssl)
service pop3-login {
  inet_listener pop3 {
    port=0
  }
}

# Turn off imap (non-ssl)
service imap-login {
  inet_listener imap {
    port=0
  }
}

disable_plaintext_auth = no
auth_mechanisms = plain login

!include_try /dev/null
!include_try /etc/dovecot/local.d/*.conf

passdb {
  driver = passwd-file
  args = /etc/dovecot/users
}

userdb {
  driver = passwd
}

# set log path for docker container to mount (and rotate)
syslog_facility = mail

# Preferred permissions: root:root 0400
ssl_cert = </etc/ssl/certificate.pem
ssl_key = </etc/ssl/key.pem

# Start LMTP listener
service lmtp {
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode = 0600
    user = postfix
    group = postfix
  }
}

# Strip domains from email addresses
auth_username_format = %Ln

# Process mail through sieve for lmtp
protocol lmtp {
  mail_plugins = $mail_plugins sieve
}

plugin {
  # Where the user’s sieve scripts live
  sieve = file:~/sieve;active=~/.dovecot.sieve

  # Enable the extprograms plugin
  sieve_plugins = sieve_extprograms

  # Authorize these extensions for *personal* scripts in 2.3:
  sieve_extensions = +vnd.dovecot.execute +vnd.dovecot.pipe

  # Configure where executables live
  sieve_execute_bin_dir = /usr/lib/dovecot/sieve-execute
  sieve_pipe_bin_dir = /usr/lib/dovecot/sieve-pipe

  # Timeouts and safety knobs
  sieve_execute_exec_timeout = 15s
  sieve_pipe_exec_timeout = 15s

  sieve_trace_dir = ~/sieve-trace
  sieve_trace_level = matching # tests + regex matches
  sieve_trace_debug = yes
}
